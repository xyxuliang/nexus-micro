global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "nexus-services"
    static_configs:
      - targets:
          - "user-service:8080"
          - "order-service:8080"
          - "payment-service:8080"
